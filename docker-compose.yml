services:
  frontend:
    build: ./frontend
    image: ghcr.io/miguelmsa1/edgebasico-latencia-frontend:latest
    container_name: hello-edge-frontend
    environment:
      REGION: "${REGION:-Bilbao}"
      LOCAL_BACKEND_PORT: "${BACKEND_PORT:-8080}"
      APP_EDGE_WS_URL: "${APP_EDGE_WS_URL:-}"
      EDGE_MADRID_WS_URL: "${EDGE_MADRID_WS_URL:-}"
      AZURE_WS_URL: "${AZURE_WS_URL:-ws://68.221.73.138:8080/ws}"
      PORT: "80"
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

  backend:
    build: ./backend
    image: ghcr.io/miguelmsa1/edgebasico-latencia-backend:latest
    container_name: hello-edge-backend
    environment:
      BACKEND_PORT: "${BACKEND_INTERNAL_PORT:-8080}"
      PUBLIC_BACKEND_PORT: "${BACKEND_PORT:-8080}"
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_INTERNAL_PORT:-8080}"
    restart: unless-stopped
