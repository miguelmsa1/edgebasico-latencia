services:
  backend:
    build: .
    image: ghcr.io/miguelmsa1/edgebasico-latencia-backend:latest
    container_name: hello-edge-backend
    environment:
      BACKEND_PORT: "${BACKEND_INTERNAL_PORT:-8080}"
      PUBLIC_BACKEND_PORT: "${BACKEND_PORT:-8080}"
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_INTERNAL_PORT:-8080}"
    restart: unless-stopped
